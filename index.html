        // Galeriye kartları dinamik olarak ekle
        function initGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            galleryData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card' + (item.large ? ' card-large' : '');
                card.onclick = () => openModal(item);
                card.style.cursor = 'pointer';
                
                let cardHTML = `
                    <img class="card-img" src="${item.image}" alt="${item.title}">
                    <div class="card-content">
                        <h3 class="card-title">${item.title}</h3>
                `;
                
                if (item.showDescription) {
                    cardHTML += `<p class="card-text">${item.description}</p>`;
                }
                
                cardHTML += `</div>`;
                
                card.innerHTML = cardHTML;
                
                gallery.appendChild(card);
            });
        }

        // Modal Aç
        function openModal(item) {
            const modal = document.getElementById('modal');
            document.getElementById('modalImage').src = item.image;
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalDescription').textContent = item.description;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Sayfanın kaymını engelle
        }

        // Modal Kapat
        function closeModal() {
            const modal = document.getElementById('modal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Modal arka planına tıklandığında kapat
        function closeModalOnBg(event) {
            if (event.target.id === 'modal') {
                closeModal();
            }
        }

        // ESC tuşu ile kapatma
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Sayfa yüklendiğinde galeriye başla
        window.addEventListener('load', initGallery);
